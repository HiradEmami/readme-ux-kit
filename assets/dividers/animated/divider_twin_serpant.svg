<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 70" width="800" height="70">
  <defs>
    <linearGradient id="serp1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="serp2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <path id="wave1"
        d="M0 35 C100 10, 200 10, 300 35 S500 60, 800 35"
        fill="none"
        stroke="url(#serp1)"
        stroke-width="3"
        stroke-linecap="round"
        stroke-dasharray="12 10">
    <animate attributeName="stroke-dashoffset" from="0" to="-44" dur="2.5s" repeatCount="indefinite"/>
  </path>

  <path id="wave2"
        d="M0 35 C100 60, 200 60, 300 35 S500 10, 800 35"
        fill="none"
        stroke="url(#serp2)"
        stroke-width="3"
        stroke-linecap="round"
        stroke-dasharray="12 10"
        opacity="0.8">
    <animate attributeName="stroke-dashoffset" from="0" to="44" dur="2.5s" repeatCount="indefinite"/>
  </path>

  <circle r="4" fill="#22d3ee">
    <animateMotion dur="3s" repeatCount="indefinite" rotate="auto">
      <mpath href="#wave1"/>
    </animateMotion>
  </circle>

  <circle r="4" fill="#a855f7">
    <animateMotion dur="3s" repeatCount="indefinite" rotate="auto">
      <mpath href="#wave2"/>
    </animateMotion>
  </circle>
</svg>
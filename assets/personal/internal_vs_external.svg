<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="100%" style="display:block">
  <defs>

    <!-- Gradients -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>

    <linearGradient id="violetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <!-- Title gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Shadow -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <style>
      .bg { fill: #020617; }

      .title {
        fill: url(#titleGrad);
        font: 800 34px 'JetBrains Mono', monospace;
        letter-spacing: 3px;
        filter: url(#softGlow);
      }

      .panel {
        fill: #0f172a;
        rx: 16;
        stroke-width: 1.5;
        filter: url(#cardShadow);
      }

      .panel-left {
        stroke: #334155;
      }

      .panel-right {
        stroke: url(#violetGrad);
        filter: url(#softGlow);
      }

      .panel-title {
        fill: #e2e8f0;
        font: 700 18px Inter, sans-serif;
        letter-spacing: 1px;
      }

      .text {
        fill: #94a3b8;
        font: 400 15px Inter, sans-serif;
      }

      .accent {
        fill: #22d3ee;
        font: 600 15px Inter, sans-serif;
      }

      .step {
        fill: #1e293b;
        stroke: url(#cyanGrad);
        stroke-width: 1.5;
        rx: 10;
        filter: url(#softGlow);
      }

      .step-text {
        fill: #cbd5e1;
        font: 600 13px 'JetBrains Mono', monospace;
      }

      .line {
        stroke: #1e293b;
        stroke-width: 2;
      }

      .active-line {
        stroke: url(#violetGrad);
        stroke-width: 3;
        stroke-dasharray: 6 6;
        filter: url(#softGlow);
      }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="1200" height="420"/>

  <!-- Title -->
  <text class="title" x="600" y="60" text-anchor="middle">
    OSS TRANSITION PIPELINE
  </text>

  <!-- LEFT PANEL -->
    <g transform="translate(60, 110)">

      <!-- base -->
      <rect width="300" height="240" rx="16"
            fill="#0f172a"
            stroke="url(#cyanGrad)"
            stroke-width="1.2"
            opacity="0.9"
            filter="url(#cardShadow)"/>

      <!-- subtle inner highlight -->
      <rect x="2" y="2" width="296" height="236" rx="14"
            fill="none"
            stroke="#22d3ee"
            stroke-opacity="0.08"/>

      <!-- very soft glow (weaker than right panel) -->
      <rect width="300" height="240" rx="16"
            fill="none"
            stroke="#22d3ee"
            stroke-opacity="0.15"
            filter="url(#softGlow)"/>

      <!-- title -->
      <text class="panel-title" x="150" y="45" text-anchor="middle">
        INTERNAL REPO
      </text>

      <!-- content -->
      <g transform="translate(40, 95)">
        <text class="text" y="0">• Hidden assumptions</text>
        <text class="text" y="32">• Hardcoded paths</text>
        <text class="text" y="64">• Private dependencies</text>
        <text class="text" y="96">• Implicit setup</text>
      </g>

    </g>

  <!-- PIPELINE -->
  <g transform="translate(400, 180)">
    <line class="line" x1="0" y1="20" x2="320" y2="20"/>
    <line class="active-line" x1="0" y1="20" x2="320" y2="20"/>

    <!-- steps -->
    <g transform="translate(0, -10)">
      <rect class="step" width="80" height="36"/>
      <text class="step-text" x="40" y="23" text-anchor="middle">CLEAN</text>
    </g>

    <g transform="translate(100, -10)">
      <rect class="step" width="80" height="36"/>
      <text class="step-text" x="40" y="23" text-anchor="middle">STRUCT</text>
    </g>

    <g transform="translate(200, -10)">
      <rect class="step" width="80" height="36"/>
      <text class="step-text" x="40" y="23" text-anchor="middle">DOCS</text>
    </g>

    <g transform="translate(300, -10)">
      <rect class="step" width="80" height="36"/>
      <text class="step-text" x="40" y="23" text-anchor="middle">VALID</text>
    </g>

    <text x="160" y="80" text-anchor="middle" fill="#475569" font-size="12">
      STANDARDIZATION PIPELINE
    </text>
  </g>

  <!-- RIGHT PANEL -->
  <g transform="translate(820, 110)">
    <rect class="panel panel-right" width="300" height="240"/>
    <text class="panel-title" x="150" y="45" text-anchor="middle" fill="#c4b5fd">
      OSS PROJECT
    </text>

    <g transform="translate(40, 95)">
      <text class="accent" y="0">✓ Explicit setup</text>
      <text class="accent" y="32">✓ Documented environment</text>
      <text class="accent" y="64">✓ Runnable example</text>
      <text class="accent" y="96">✓ Works anywhere</text>
    </g>
  </g>

  <!-- FLOW DOT -->
  <circle r="4" fill="#22d3ee" filter="url(#softGlow)">
    <animateMotion dur="2.5s" repeatCount="indefinite"
      path="M 360,210 L 820,210"/>
  </circle>

</svg>
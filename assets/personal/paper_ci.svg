<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <filter id="drawioGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>

    <linearGradient id="violetGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="400" fill="#020617"/>

  <text x="600" y="60" text-anchor="middle" fill="#f1f5f9" style="font-family: Arial, sans-serif; font-size: 28px; font-weight: 900; letter-spacing: 4px;" filter="url(#drawioGlow)">AUTOMATED ARTIFACT ENGINE</text>

  <g stroke="url(#flowGrad)" stroke-width="4" fill="none" opacity="0.6" filter="url(#drawioGlow)">
    <path d="M220 200 L320 200" stroke-dasharray="8,12">
      <animate attributeName="stroke-dashoffset" from="40" to="0" dur="1s" repeatCount="indefinite" />
    </path>
    <path d="M480 200 L580 200" stroke-dasharray="8,12">
      <animate attributeName="stroke-dashoffset" from="40" to="0" dur="0.8s" repeatCount="indefinite" />
    </path>
    <path d="M780 200 L880 200" stroke-dasharray="8,12">
      <animate attributeName="stroke-dashoffset" from="40" to="0" dur="0.6s" repeatCount="indefinite" />
    </path>
  </g>

  <circle r="4" fill="#ffffff" filter="url(#drawioGlow)">
    <animateMotion path="M220 200 L320 200" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle r="4" fill="#ffffff" filter="url(#drawioGlow)">
    <animateMotion path="M480 200 L580 200" dur="1.5s" repeatCount="indefinite" />
  </circle>
  <circle r="4" fill="#ffffff" filter="url(#drawioGlow)">
    <animateMotion path="M780 200 L880 200" dur="1s" repeatCount="indefinite" />
  </circle>

  <g transform="translate(60, 150)">
    <path d="M0 20 L80 0 L160 20 L160 100 L80 120 L0 100 Z" fill="#0f172a" stroke="#22d3ee" stroke-width="2" filter="url(#drawioGlow)"/>
    <text x="80" y="65" text-anchor="middle" fill="#22d3ee" style="font-family: Arial, sans-serif; font-size: 18px; font-weight: 800;">COMMIT</text>
    <text x="80" y="85" text-anchor="middle" fill="#94a3b8" style="font-family: monospace; font-size: 10px;">SRC PUSH</text>
  </g>

  <g transform="translate(320, 150)">
    <path d="M0 20 L80 0 L160 20 L160 100 L80 120 L0 100 Z" fill="#0f172a" stroke="#a78bfa" stroke-width="2" filter="url(#drawioGlow)"/>
    <text x="80" y="65" text-anchor="middle" fill="#a78bfa" style="font-family: Arial, sans-serif; font-size: 18px; font-weight: 800;">CI RUN</text>
    <text x="80" y="85" text-anchor="middle" fill="#94a3b8" style="font-family: monospace; font-size: 10px;">LINT/TEST</text>
  </g>

  <g transform="translate(580, 150)">
    <path d="M0 20 L100 0 L200 20 L200 100 L100 120 L0 100 Z" fill="#1e1b4b" stroke="#8b5cf6" stroke-width="3" filter="url(#drawioGlow)"/>
    <text x="100" y="65" text-anchor="middle" fill="#ffffff" style="font-family: Arial, sans-serif; font-size: 20px; font-weight: 800;">LaTeX BUILD</text>
    <text x="100" y="88" text-anchor="middle" fill="#f0abfc" style="font-family: monospace; font-size: 12px; font-weight: bold;">RENDER</text>
  </g>

  <g transform="translate(880, 150)">
    <path d="M0 20 L100 0 L200 20 L200 100 L100 120 L0 100 Z" fill="#0f172a" stroke="#ffffff" stroke-width="2" filter="url(#drawioGlow)"/>
    <rect x="80" y="30" width="40" height="50" fill="#ffffff" opacity="0.1">
        <animate attributeName="opacity" values="0.001;0.0;0.1" dur="2s" repeatCount="indefinite" />
    </rect>
    <text x="100" y="65" text-anchor="middle" fill="#ffffff" style="font-family: Arial, sans-serif; font-size: 18px; font-weight: 800;" filter="url(#drawioGlow)">PDF ARTIFACT</text>
    <text x="100" y="85" text-anchor="middle" fill="#22d3ee" style="font-family: monospace; font-size: 10px;">v1.0.0-RELEASE</text>
  </g>

  <g transform="translate(500, 350)">
    <circle r="5" fill="#22d3ee" filter="url(#drawioGlow)">
        <animate attributeName="r" values="4;7;4" dur="1s" repeatCount="indefinite" />
    </circle>
    <text x="15" y="5" fill="#94a3b8" style="font-family: monospace; font-size: 12px; letter-spacing: 2px;">SYSTEM STATUS: ACTIVE</text>
  </g>
</svg>

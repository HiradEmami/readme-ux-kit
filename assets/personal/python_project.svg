<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" width="100%" style="display:block" role="img" aria-label="Open Source ML Projects Breakdown">
  <defs>
    <filter id="drawioGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <rect width="960" height="560" fill="#020617"/>

  <g fill="#ffffff" opacity="0.4">
    <circle cx="100" cy="100" r="1.5"/>
    <circle cx="860" cy="150" r="2" fill="#67e8f9"/>
    <circle cx="810" cy="450" r="1.8" fill="#c4b5fd"/>
    <circle cx="150" cy="480" r="1.2"/>
  </g>

  <g transform="translate(80, 0)">

    <g transform="translate(400, 40)">
      <rect width="400" height="70" x="-200" y="0" rx="12" fill="#0f172a" stroke="url(#mainGrad)" stroke-width="2.5" filter="url(#drawioGlow)"/>
      <text x="0" y="42" text-anchor="middle" fill="#f1f5f9" style="font-family: monospace; font-size: 20px; font-weight: 800;">&gt;_ Open Source ML Projects</text>
    </g>

    <g transform="translate(400, 110)" fill="none" stroke="#334155" stroke-width="2">
      <path id="pathLeft1" d="M0,0 Q-150,20 -240,65" />
      <path id="pathLeft2" d="M0,0 Q-180,100 -240,165" />
      <path id="pathLeft3" d="M0,0 Q-150,180 -240,265" />

      <path id="pathRight1" d="M0,0 Q150,10 240,40" />
      <path id="pathRight2" d="M0,0 Q180,60 240,115" />
      <path id="pathRight3" d="M0,0 Q180,140 240,190" />
      <path id="pathRight4" d="M0,0 Q150,200 240,265" />

      <g fill="#ffffff" filter="url(#drawioGlow)" stroke="none">
          <circle r="3"><animateMotion dur="3s" repeatCount="indefinite" path="M0,0 Q-150,20 -240,65"/></circle>
          <circle r="3"><animateMotion dur="3.5s" repeatCount="indefinite" path="M0,0 Q-180,100 -240,165"/></circle>
          <circle r="3"><animateMotion dur="4s" repeatCount="indefinite" path="M0,0 Q-150,180 -240,265"/></circle>
          <circle r="3"><animateMotion dur="2.8s" repeatCount="indefinite" path="M0,0 Q150,10 240,40"/></circle>
          <circle r="3"><animateMotion dur="3.2s" repeatCount="indefinite" path="M0,0 Q180,60 240,115"/></circle>
          <circle r="3"><animateMotion dur="3.8s" repeatCount="indefinite" path="M0,0 Q180,140 240,190"/></circle>
          <circle r="3"><animateMotion dur="4.2s" repeatCount="indefinite" path="M0,0 Q150,200 240,265"/></circle>
      </g>
    </g>

    <g transform="translate(160, 175)">
      <g transform="translate(0, 0)">
        <rect width="280" height="50" x="-220" y="-25" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
        <text x="-86" y="6" text-anchor="middle" fill="#cbd5e1" style="font-family: Arial, sans-serif; font-size: 16px; font-weight: 500;">Code Base</text>
      </g>
      <g transform="translate(0, 100)">
        <rect width="280" height="50" x="-220" y="-25" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
        <text x="-86" y="6" text-anchor="middle" fill="#cbd5e1" style="font-family: Arial, sans-serif; font-size: 16px; font-weight: 500;">Model Weights</text>
      </g>
      <g transform="translate(0, 200)">
        <rect width="280" height="50" x="-220" y="-25" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
        <text x="-86" y="6" text-anchor="middle" fill="#cbd5e1" style="font-family: Arial, sans-serif; font-size: 16px; font-weight: 500;">Inference Example</text>
      </g>
    </g>

    <g transform="translate(640, 150)">
      <g transform="translate(0, 0)">
        <rect width="260" height="50" x="-30" y="-25" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
        <text x="100" y="6" text-anchor="middle" fill="#cbd5e1" style="font-family: Arial, sans-serif; font-size: 16px; font-weight: 500;">Data (Training/Testing)</text>
      </g>
      <g transform="translate(0, 75)">
        <rect width="260" height="50" x="-30" y="-25" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
        <text x="100" y="6" text-anchor="middle" fill="#cbd5e1" style="font-family: Arial, sans-serif; font-size: 16px; font-weight: 500;">Documentation</text>
      </g>
      <g transform="translate(0, 150)">
        <rect width="260" height="50" x="-30" y="-25" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
        <text x="100" y="6" text-anchor="middle" fill="#cbd5e1" style="font-family: Arial, sans-serif; font-size: 16px; font-weight: 500;">Research Paper</text>
      </g>
      <g transform="translate(0, 225)">
        <rect width="260" height="50" x="-30" y="-25" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
        <text x="100" y="6" text-anchor="middle" fill="#cbd5e1" style="font-family: Arial, sans-serif; font-size: 16px; font-weight: 500;">Tooling &amp; CI/CD</text>
      </g>
    </g>
  </g>
</svg>
